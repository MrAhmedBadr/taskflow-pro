<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TaskFlow Pro</title>
    <!--
      SPA fallback for GitHub Pages.
      GitHub serves this file for any unknown path (e.g. a refresh on
      /taskflow-pro/dashboard). It rewrites the URL into a query string and
      redirects to the app root, where the decoder in index.html restores the
      real path before React Router boots. Based on rafgraph/spa-github-pages.
    -->
    <script>
      (function () {
        // Number of path segments to preserve (the repo/base: /taskflow-pro/).
        var pathSegmentsToKeep = 1;

        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
