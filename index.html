<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- Primary SEO meta tags -->
    <title>TaskFlow Pro — Project management, reimagined</title>
    <meta name="title" content="TaskFlow Pro — Project management, reimagined" />
    <meta
      name="description"
      content="TaskFlow Pro is the premium project management platform for modern teams. Plan, track, and ship work with beautiful boards, real-time collaboration, and powerful analytics."
    />
    <meta name="keywords" content="project management, kanban, tasks, team collaboration, productivity, SaaS" />
    <meta name="author" content="TaskFlow Pro" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TaskFlow Pro — Project management, reimagined" />
    <meta
      property="og:description"
      content="Plan, track, and ship work with beautiful boards, real-time collaboration, and powerful analytics."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TaskFlow Pro — Project management, reimagined" />
    <meta
      name="twitter:description"
      content="Plan, track, and ship work with beautiful boards, real-time collaboration, and powerful analytics."
    />

    <!-- Prevent theme flash: apply persisted / system theme before paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('taskflow-theme');
          var theme = stored ? JSON.parse(stored).state.theme : 'system';
          var isDark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
